<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <!-- Poor Man — slim, brown cloak, humble posture, slight forward lean -->
  <defs>
    <radialGradient id="poor-body-grad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#8a6a40"/>
      <stop offset="100%" stop-color="#4a3018"/>
    </radialGradient>
    <radialGradient id="poor-hood-grad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#7a5a30"/>
      <stop offset="100%" stop-color="#3a2010"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="395" rx="38" ry="5" fill="rgba(0,0,0,0.25)"/>

  <!-- Cloak body — slim, slightly forward lean -->
  <path d="M 65 162 Q 48 222 46 322 Q 60 372 100 375 Q 140 372 154 322 Q 152 222 135 162 Z"
        fill="url(#poor-body-grad)" opacity="0.92"/>

  <!-- Cloak folds — worn, irregular -->
  <path d="M 80 172 Q 76 248 74 328" stroke="#3a2010" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 118 172 Q 122 248 124 328" stroke="#3a2010" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 100 166 Q 100 255 100 340" stroke="#3a2010" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Worn patch suggestion -->
  <path d="M 88 240 Q 92 255 88 270" stroke="#3a2010" stroke-width="3" fill="none" opacity="0.3"/>

  <!-- Hood — simple, humble -->
  <path d="M 60 158 Q 60 78 100 68 Q 140 78 140 158 Q 124 146 100 150 Q 76 146 60 158 Z"
        fill="url(#poor-hood-grad)"/>

  <!-- Hood shadow -->
  <path d="M 74 150 Q 74 94 100 84 Q 126 94 126 150 Q 112 140 100 142 Q 88 140 74 150 Z"
        fill="#1a0a00" opacity="0.6"/>

  <!-- Shoulders — narrow -->
  <path d="M 60 158 Q 42 168 40 188 Q 56 178 70 172 Z" fill="#4a3018"/>
  <path d="M 140 158 Q 158 168 160 188 Q 144 178 130 172 Z" fill="#4a3018"/>

  <!-- Arms — slim -->
  <path d="M 46 188 Q 42 236 46 274" stroke="#4a3018" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M 154 188 Q 158 236 154 274" stroke="#4a3018" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- Simple trim — minimal -->
  <path d="M 46 322 Q 100 332 154 322" stroke="#8a6a40" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
