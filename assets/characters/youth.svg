<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <!-- Youth — blue hood, medium height, slightly forward lean -->
  <defs>
    <radialGradient id="youth-body-grad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#5a8fd4"/>
      <stop offset="100%" stop-color="#2a5fa0"/>
    </radialGradient>
    <radialGradient id="youth-hood-grad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4a7fc4"/>
      <stop offset="100%" stop-color="#1a4f90"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="395" rx="45" ry="6" fill="rgba(0,0,0,0.3)"/>

  <!-- Cloak body -->
  <path d="M 60 160 Q 40 220 35 320 Q 50 370 100 375 Q 150 370 165 320 Q 160 220 140 160 Z"
        fill="url(#youth-body-grad)" opacity="0.95"/>

  <!-- Cloak folds -->
  <path d="M 80 170 Q 75 240 72 320" stroke="#1a4f90" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 120 170 Q 125 240 128 320" stroke="#1a4f90" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 100 165 Q 100 250 100 340" stroke="#1a4f90" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Hood -->
  <path d="M 55 155 Q 55 80 100 70 Q 145 80 145 155 Q 130 145 100 148 Q 70 145 55 155 Z"
        fill="url(#youth-hood-grad)"/>

  <!-- Hood shadow/depth -->
  <path d="M 68 148 Q 68 100 100 92 Q 132 100 132 148 Q 116 138 100 140 Q 84 138 68 148 Z"
        fill="#0d2a60" opacity="0.6"/>

  <!-- Shoulders -->
  <path d="M 55 155 Q 40 165 38 185 Q 55 175 70 170 Z" fill="#2a5fa0"/>
  <path d="M 145 155 Q 160 165 162 185 Q 145 175 130 170 Z" fill="#2a5fa0"/>

  <!-- Subtle arm suggestion -->
  <path d="M 42 185 Q 38 230 42 270" stroke="#2a5fa0" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M 158 185 Q 162 230 158 270" stroke="#2a5fa0" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- Gold trim at hem -->
  <path d="M 35 320 Q 100 330 165 320" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- CSS animation hook class -->
  <g class="character-highlight" opacity="0">
    <path d="M 60 160 Q 40 220 35 320 Q 50 370 100 375 Q 150 370 165 320 Q 160 220 140 160 Z"
          fill="#5a8fd4" opacity="0.2"/>
  </g>
</svg>
