<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <!-- Rich Man — stocky, gold/orange cloak, proud upright posture -->
  <defs>
    <radialGradient id="rich-body-grad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#d4882a"/>
      <stop offset="100%" stop-color="#8a4a0a"/>
    </radialGradient>
    <radialGradient id="rich-hood-grad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#c47820"/>
      <stop offset="100%" stop-color="#7a3a05"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="395" rx="52" ry="7" fill="rgba(0,0,0,0.35)"/>

  <!-- Cloak body — wider/stockier -->
  <path d="M 52 158 Q 26 215 22 318 Q 40 372 100 376 Q 160 372 178 318 Q 174 215 148 158 Z"
        fill="url(#rich-body-grad)" opacity="0.95"/>

  <!-- Cloak folds -->
  <path d="M 72 168 Q 62 248 58 325" stroke="#7a3a05" stroke-width="2" fill="none" opacity="0.45"/>
  <path d="M 128 168 Q 138 248 142 325" stroke="#7a3a05" stroke-width="2" fill="none" opacity="0.45"/>
  <path d="M 100 162 Q 100 258 100 342" stroke="#7a3a05" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Hood — wide, proud -->
  <path d="M 48 154 Q 48 72 100 60 Q 152 72 152 154 Q 132 142 100 146 Q 68 142 48 154 Z"
        fill="url(#rich-hood-grad)"/>

  <!-- Hood shadow -->
  <path d="M 64 146 Q 64 90 100 80 Q 136 90 136 146 Q 118 134 100 138 Q 82 134 64 146 Z"
        fill="#3a1800" opacity="0.65"/>

  <!-- Shoulders — very broad -->
  <path d="M 48 154 Q 22 166 20 192 Q 44 178 62 170 Z" fill="#8a4a0a"/>
  <path d="M 152 154 Q 178 166 180 192 Q 156 178 138 170 Z" fill="#8a4a0a"/>

  <!-- Arms — thick -->
  <path d="M 26 192 Q 20 242 26 282" stroke="#8a4a0a" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M 174 192 Q 180 242 174 282" stroke="#8a4a0a" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- Gold trim — lavish -->
  <path d="M 22 318 Q 100 334 178 318" stroke="#c9a84c" stroke-width="3" fill="none" opacity="0.9"/>
  <path d="M 64 146 Q 100 156 136 146" stroke="#c9a84c" stroke-width="2.5" fill="none" opacity="0.8"/>
  <!-- Extra gold band -->
  <path d="M 30 260 Q 100 272 170 260" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>
