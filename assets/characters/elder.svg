<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <!-- Elder/Narrator — tall, grey cloak, staff -->
  <defs>
    <radialGradient id="elder-body-grad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#9a9a9a"/>
      <stop offset="100%" stop-color="#5a5a5a"/>
    </radialGradient>
    <radialGradient id="elder-hood-grad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#8a8a8a"/>
      <stop offset="100%" stop-color="#4a4a4a"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="105" cy="395" rx="48" ry="6" fill="rgba(0,0,0,0.3)"/>

  <!-- Staff -->
  <line x1="155" y1="100" x2="162" y2="380" stroke="#6b4c2a" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="158" cy="100" rx="5" ry="8" fill="#8a6a3a"/>

  <!-- Cloak body — taller/wider than youth -->
  <path d="M 55 155 Q 32 220 28 325 Q 45 375 100 378 Q 155 375 172 325 Q 168 220 145 155 Z"
        fill="url(#elder-body-grad)" opacity="0.95"/>

  <!-- Cloak folds -->
  <path d="M 75 165 Q 68 250 65 330" stroke="#4a4a4a" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 125 165 Q 132 250 135 330" stroke="#4a4a4a" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 100 160 Q 100 260 100 345" stroke="#4a4a4a" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Hood — deeper/larger -->
  <path d="M 50 150 Q 50 65 100 55 Q 150 65 150 150 Q 132 138 100 142 Q 68 138 50 150 Z"
        fill="url(#elder-hood-grad)"/>

  <!-- Hood shadow -->
  <path d="M 65 143 Q 65 88 100 80 Q 135 88 135 143 Q 118 132 100 134 Q 82 132 65 143 Z"
        fill="#222222" opacity="0.65"/>

  <!-- Shoulders — broad -->
  <path d="M 50 150 Q 30 162 28 185 Q 48 172 65 167 Z" fill="#5a5a5a"/>
  <path d="M 150 150 Q 170 162 172 185 Q 152 172 135 167 Z" fill="#5a5a5a"/>

  <!-- Arms -->
  <path d="M 34 185 Q 30 235 35 275" stroke="#5a5a5a" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M 166 185 Q 170 235 165 275" stroke="#5a5a5a" stroke-width="13" stroke-linecap="round" fill="none"/>

  <!-- Gold trim -->
  <path d="M 28 325 Q 100 338 172 325" stroke="#c9a84c" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Gold collar -->
  <path d="M 68 143 Q 100 150 132 143" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>
